name: CI

on:
  push:
    branches:
      - main
      - 'release/*'
  pull_request:
    branches:
      - main
      - 'release/*'

jobs:
  build:
    name: Build & Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # dist/ is committed so the tool installs straight from GitHub without a
      # build step. Fail if the committed dist/ is out of date with src/.
      - name: Verify committed dist/ is up to date
        run: |
          if ! git diff --exit-code -- dist; then
            echo "::error::dist/ is stale — run 'npm run build' and commit the result."
            exit 1
          fi

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration
